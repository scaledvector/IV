const tabs=["t1","t2","t3","t4","t5","t6"];
const done={};
let cur=0;

function show(id){
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.querySelector(`[data-tab="${id}"]`).classList.add("active");
  if(!done[id]){
    done[id]=true;
    /* measure width AFTER panel is visible */
    requestAnimationFrame(()=>{
      const w = getW();
      const spec = makeSpecs(w)[id];
      vegaEmbed("#"+id.replace("t","v"), spec, {mode:"vega-lite",actions:false}).catch(console.warn);
    });
  }
}

document.getElementById("tabBar").addEventListener("click",e=>{
  const t=e.target.dataset.tab;
  if(t){cur=tabs.indexOf(t);show(t);}
});

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight"||e.key==="ArrowDown"){cur=(cur+1)%tabs.length;show(tabs[cur]);}
  else if(e.key==="ArrowLeft"||e.key==="ArrowUp"){cur=(cur-1+tabs.length)%tabs.length;show(tabs[cur]);}
});
